syntax = "proto3";

package playground;

option java_package = "io.github.rbleuse.playground.proto";
option java_outer_classname = "QueueMessages";

message QueueMessage {
  string id = 1;

  oneof payload {
    Email email = 2;
    Sms sms = 3;
    Push push = 4;
    Audit audit = 5;
  }
}

message Email {
  string recipient = 1;
  string subject = 2;
}

message Sms {
  string phone_number = 1;
  string text = 2;
}

message Push {
  string device_token = 1;
  string title = 2;
}

message Audit {
  string actor = 1;
  string action = 2;
}
